<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beats · Portfolio</title>
  <meta name="description" content="Produções autorais e o radinho do estúdio." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Science+Gothic:opsz,wdth,wght@8..144,25..151,100..900&family=JetBrains+Mono:wght@400;700&display=swap" />

  <link rel="stylesheet" href="shared/css/base.css" />
  <link rel="stylesheet" href="shared/css/loading.css" />
  <link rel="stylesheet" href="shared/css/terminal.css" />
  <link rel="stylesheet" href="shared/css/layout.css" />
  <script src="shared/js/utils.js"></script>
  <script src="shared/js/loading.js"></script>
  <script src="shared/js/theme-toggle.js" defer></script>
  <script src="shared/js/menu.js" defer></script>
  <script src="shared/js/background-2d.js" defer></script>
  <script src="shared/js/background-3d.js" defer></script>
  <script src="shared/js/background-switch.js" defer></script>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <header class="site-header">
    <a class="site-logo" href="index.html">// PORT<span>FOLIO</span>_</a>
    <button class="nav-toggle" aria-label="Abrir menu">≡</button>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="galeria.html">Galeria</a>
      <a href="beats.html">Beats</a>
      <a href="prototipos.html">Protótipos</a>
      <a href="consultoria.html">Serviços</a>
      <a href="diario/">Diário</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Beats</h1>
        <p>Toca-discos virtual. Produções autorais e o que está rolando no Radinho do estúdio.</p>
      </div>
    </section>

    <div class="tabs" id="tabs">
      <button class="is-active" data-tab="autorais">Produções Autorais</button>
      <button data-tab="radinho">Mais Tocadas no Radinho</button>
    </div>

    <div class="beats-viz">
      <canvas id="viz"></canvas>
    </div>

    <div class="beats-grid" id="grid"></div>

    <!-- iframes ocultos controlados via JS -->
    <iframe id="sc-player" allow="autoplay" style="display:none" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&auto_play=false"></iframe>
    <div id="yt-player" style="display:none"></div>
  </main>

<script>
// Substitua pelos IDs reais de SoundCloud (track URL) e YouTube (videoId)
const TRACKS = {
  autorais: [
    { id:"a1", type:"sc",  title:"Aurora Boreal", artist:"Você", scUrl:"https://api.soundcloud.com/tracks/293" },
    { id:"a2", type:"sc",  title:"Construct 01",  artist:"Você", scUrl:"https://api.soundcloud.com/tracks/294" },
    { id:"a3", type:"yt",  title:"Loop Cinza",    artist:"Você", ytId:"dQw4w9WgXcQ" }
  ],
  radinho: [
    { id:"r1", type:"yt",  title:"Refree — Aigua",          artist:"Refree",         ytId:"jNQXAC9IVRw" },
    { id:"r2", type:"sc",  title:"Friend selection",        artist:"Vários",         scUrl:"https://api.soundcloud.com/tracks/295" },
    { id:"r3", type:"yt",  title:"Madlib instrumentals",    artist:"Madlib",         ytId:"M7lc1UVf-VE" }
  ]
};

let curTab = "autorais", current = null, ytReady = false, ytPlayer, scWidget;
const grid = document.getElementById("grid");
const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");

// SoundCloud Widget
scWidget = SC.Widget(document.getElementById("sc-player"));

// YouTube IFrame API
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player("yt-player", {
    videoId: "dQw4w9WgXcQ",
    events: { onReady: () => { ytReady = true; } }
  });
}
window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

function render() {
  const list = TRACKS[curTab];
  grid.innerHTML = list.map(t => `
    <article class="beat-card" data-id="${t.id}">
      <div class="vinyl"></div>
      <div>
        <h3>${t.title}</h3>
        <div class="artist">${t.artist} · ${t.type.toUpperCase()}</div>
        <div class="ctrls">
          <button data-act="play">▶ Play</button>
          <button data-act="pause">‖</button>
          <button data-act="stop">■</button>
        </div>
      </div>
    </article>`).join("");
}

document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  document.querySelectorAll("#tabs button").forEach(x => x.classList.remove("is-active"));
  b.classList.add("is-active");
  curTab = b.dataset.tab; render();
});

grid.addEventListener("click", e => {
  const btn = e.target.closest("button"); if (!btn) return;
  const card = e.target.closest(".beat-card");
  const track = TRACKS[curTab].find(t => t.id === card.dataset.id);
  const act = btn.dataset.act;
  document.querySelectorAll(".beat-card").forEach(c => c.classList.remove("is-playing"));

  if (act === "play") {
    current = track;
    card.classList.add("is-playing");
    if (track.type === "sc") {
      scWidget.load(track.scUrl, { auto_play: true });
    } else if (track.type === "yt" && ytReady) {
      ytPlayer.loadVideoById(track.ytId);
      ytPlayer.playVideo();
    }
  } else if (act === "pause") {
    if (current && current.type === "sc") scWidget.pause();
    else if (current && ytReady) ytPlayer.pauseVideo();
  } else {
    if (current && current.type === "sc") scWidget.pause();
    else if (current && ytReady) ytPlayer.stopVideo();
    current = null;
  }
});

// Viz abstrato — pulsa com tempo (e responde a posição da música quando disponível)
let progress = 0;
function tickProgress() {
  if (current && current.type === "sc" && scWidget) {
    scWidget.getPosition(p => { scWidget.getDuration(d => { if (d > 0) progress = (p % d) / d; }); });
  } else if (current && current.type === "yt" && ytReady && ytPlayer.getDuration) {
    try { const d = ytPlayer.getDuration(); const p = ytPlayer.getCurrentTime();
      if (d > 0) progress = p / d; } catch {}
  }
  setTimeout(tickProgress, 500);
}
tickProgress();

function resizeViz() {
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
}
window.addEventListener("resize", resizeViz); resizeViz();

function viz(t) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const palette = ["#54D930","#04B2D9","#F2A03D","#F25430","#05AFF2"];
  const bars = 64;
  for (let i = 0; i < bars; i++) {
    const x = (i / bars) * W;
    const seed = Math.sin(t*0.002 + i*0.4) * 0.5 + 0.5;
    const pulse = 0.4 + (current ? 0.8 : 0.2) * seed;
    const h = (H * 0.6) * pulse * (0.6 + Math.sin(t*0.003 + i)*0.4);
    ctx.fillStyle = palette[i % palette.length];
    ctx.globalAlpha = 0.7;
    ctx.fillRect(x, H/2 - h/2, W/bars - 2, h);
  }
  // marcador de progresso
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#F25430";
  ctx.fillRect(progress * W - 1, 0, 2, H);
  requestAnimationFrame(viz);
}
requestAnimationFrame(viz);

render();
</script>
</body>
</html>
